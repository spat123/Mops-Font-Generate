# Сборка и push образа в Yandex Container Registry (RU prod).
# Secrets: YC_SA_JSON_CREDENTIALS, YC_REGISTRY (cr.yandex/<id>/dinamic-font-ru), YC_FOLDER_ID
name: Deploy RU image to Yandex CR

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yandex.yml'
      - 'pages/**'
      - 'components/**'
      - 'lib/**'
      - 'utils/**'
      - 'hooks/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.js'

jobs:
  build-push:
    if: ${{ secrets.YC_SA_JSON_CREDENTIALS != '' && secrets.YC_REGISTRY != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Yandex Container Registry
        env:
          YC_SA_JSON_CREDENTIALS: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
        run: |
          echo "$YC_SA_JSON_CREDENTIALS" > sa-key.json
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i /tmp/yc -n
          /tmp/yc/bin/yc config profile create github --folder-id "${{ secrets.YC_FOLDER_ID }}"
          /tmp/yc/bin/yc config set service-account-key sa-key.json
          /tmp/yc/bin/yc container registry configure-docker

      - name: Build and push
        run: |
          IMAGE="${{ secrets.YC_REGISTRY }}"
          docker build -t "$IMAGE:latest" -t "$IMAGE:${{ github.sha }}" .
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"
