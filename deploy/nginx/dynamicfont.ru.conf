# /etc/nginx/sites-available/dynamicfont.ru
# sudo ln -s .../sites-available/dynamicfont.ru .../sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name dynamicfont.ru www.dynamicfont.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dynamicfont.ru www.dynamicfont.ru;

    # certbot --nginx -d dynamicfont.ru -d www.dynamicfont.ru
    ssl_certificate /etc/letsencrypt/live/dynamicfont.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dynamicfont.ru/privkey.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
    }
}
